<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>恋人空间 - 管理后台</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💕</text></svg>">
<style>
:root{--pri:#FF6B9D;--pri-l:#FF8FB1;--pri-d:#E55A8A;--sec:#A29BFE;--acc:#74B9FF;--ok:#00B894;--warn:#FDCB6E;--err:#FF7675;--bg:#F8F9FC;--card:#FFF;--tx1:#1A1A2E;--tx2:#6C757D;--tx3:#ADB5BD;--brd:#E9ECEF;--brd-l:#F1F3F5;--sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);--sh2:0 10px 40px rgba(0,0,0,.1);--r:12px;--rs:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--tx1);min-height:100vh;display:flex}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#D0D5DD;border-radius:3px}
/* Sidebar */
.side{width:220px;background:#fff;border-right:1px solid var(--brd);position:fixed;top:0;bottom:0;left:0;z-index:100;display:flex;flex-direction:column;transition:width .3s}
.side-logo{padding:20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--brd-l)}
.side-logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--pri),var(--sec));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.side-logo h1{font-size:16px;font-weight:700;color:var(--tx1)}
.side-logo p{font-size:11px;color:var(--tx2);margin-top:2px}
.side-nav{flex:1;padding:12px 0;overflow-y:auto}
.side-section{padding:8px 16px;font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-top:8px}
.side-item{display:flex;align-items:center;gap:10px;padding:10px 16px;margin:2px 8px;border-radius:var(--rs);cursor:pointer;transition:all .15s;font-size:13px;color:var(--tx2);text-decoration:none}
.side-item:hover{background:var(--brd-l);color:var(--tx1)}
.side-item.on{background:linear-gradient(135deg,rgba(255,107,157,.1),rgba(162,155,254,.1));color:var(--pri);font-weight:500}
.side-item i{font-size:18px;width:22px;text-align:center;flex-shrink:0}
.side-footer{padding:16px;border-top:1px solid var(--brd-l);font-size:11px;color:var(--tx3);text-align:center}
/* Main */
.main{flex:1;margin-left:220px;padding:24px;min-height:100vh}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.topbar h2{font-size:22px;font-weight:700;color:var(--tx1)}
.topbar-right{display:flex;align-items:center;gap:12px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:500}
.badge-ok{background:#E6F9F1;color:var(--ok)}.badge-err{background:#FEE;color:var(--err)}.badge-warn{background:#FFF8E1;color:#E67E22}.badge-info{background:#E8F4FD;color:#1976D2}.badge-pri{background:linear-gradient(135deg,#FFE0EB,#FFC1D3);color:var(--pri)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.dot-ok{background:var(--ok)}.dot-err{background:var(--err)}.dot-warn{background:var(--warn)}
/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat{background:#fff;border-radius:var(--r);padding:20px;box-shadow:var(--sh);border:1px solid var(--brd-l);transition:all .2s}
.stat:hover{box-shadow:var(--sh2);transform:translateY(-2px)}
.stat-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.stat-icon.pk{background:#FFF0F5}.stat-icon.pp{background:#F3EEFF}.stat-icon.bl{background:#EBF5FF}.stat-icon.gn{background:#E6F9F1}.stat-icon.og{background:#FFF8E1}
.stat-label{font-size:12px;color:var(--tx2);margin-bottom:4px}
.stat-value{font-size:28px;font-weight:700;color:var(--tx1);line-height:1.1}
.stat-sub{font-size:11px;color:var(--tx3);margin-top:6px}
/* Card */
.card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--brd-l);margin-bottom:20px}
.card-h{padding:16px 20px;border-bottom:1px solid var(--brd-l);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.card-t{font-size:15px;font-weight:600;color:var(--tx1)}
.card-acts{display:flex;gap:8px;align-items:center}
.card-b{padding:0 20px 20px;overflow-x:auto}
/* Table */
table{width:100%;border-collapse:collapse}
th{padding:10px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--brd);background:var(--bg);white-space:nowrap}
td{padding:12px;font-size:13px;border-bottom:1px solid var(--brd-l);vertical-align:middle}
tbody tr:hover{background:#FAFBFC}
/* Search */
.search{position:relative}.search::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:12px}
.search input{padding:8px 12px 8px 32px;border:1px solid var(--brd);border-radius:var(--rs);font-size:13px;width:220px;background:var(--bg);transition:.2s}
.search input:focus{outline:none;border-color:var(--pri);background:#fff;box-shadow:0 0 0 3px rgba(255,107,157,.1)}
/* Buttons */
.btn{padding:7px 14px;border:none;border-radius:var(--rs);cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.btn-p{background:var(--pri);color:#fff}.btn-p:hover{background:var(--pri-d)}
.btn-g{background:var(--bg);color:var(--tx2);border:1px solid var(--brd)}.btn-g:hover{background:var(--brd-l)}
.btn-d{background:#FFF0F0;color:var(--err);border:1px solid #FFD4D4}.btn-d:hover{background:#FFE8E8}
.btn-s{background:#E6F9F1;color:var(--ok);border:1px solid #B8E6CC}.btn-s:hover{background:#D0F0E3}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-acts{display:flex;gap:4px}
/* Avatar */
.av{width:36px;height:36px;border-radius:50%;object-fit:cover;border:1px solid var(--brd)}
.av-sm{width:28px;height:28px}
/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--tx3)}
.empty i{font-size:48px;display:block;margin-bottom:12px}
.empty p{font-size:14px;color:var(--tx2)}
/* Loading */
.ld{display:flex;align-items:center;justify-content:center;padding:60px}
.sp{width:32px;height:32px;border:3px solid var(--brd);border-top-color:var(--pri);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
/* Modal */
.mo{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);justify-content:center;align-items:center;z-index:200;backdrop-filter:blur(4px)}
.mo.on{display:flex}
.mo-c{background:#fff;border-radius:var(--r);padding:24px;width:90%;max-width:520px;max-height:85vh;overflow-y:auto;box-shadow:var(--sh2)}
.mo-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mo-h h3{font-size:17px;font-weight:600}
.mo-x{font-size:20px;cursor:pointer;color:var(--tx3);padding:4px;border-radius:var(--rs)}.mo-x:hover{background:var(--bg);color:var(--tx1)}
.fg{margin-bottom:14px}
.fg label{display:block;margin-bottom:5px;font-size:12px;color:var(--tx2);font-weight:500}
.fg input,.fg textarea,.fg select{width:100%;padding:9px 12px;border:1px solid var(--brd);border-radius:var(--rs);font-size:13px;transition:.2s}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px rgba(255,107,157,.1)}
.fg textarea{resize:vertical;min-height:80px}
.fa{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
/* SQL */
.sql-wrap{display:flex;gap:8px;margin-bottom:14px}
.sql-wrap input{flex:1;padding:10px 14px;border:1px solid var(--brd);border-radius:var(--rs);font-size:13px;font-family:'SF Mono',Monaco,monospace}
.sql-wrap input:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px rgba(255,107,157,.1)}
/* Tabs */
.tab-bar{display:flex;gap:4px;margin-bottom:16px;border-bottom:2px solid var(--brd);padding-bottom:0}
.tab-btn{padding:10px 16px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--tx2);border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s}
.tab-btn:hover{color:var(--tx1)}
.tab-btn.on{color:var(--pri);border-bottom-color:var(--pri)}
/* Toast */
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;background:var(--tx1);color:#fff;border-radius:var(--rs);font-size:13px;z-index:300;animation:fi .3s;box-shadow:var(--sh2)}
.toast.ok{background:var(--ok)}.toast.er{background:var(--err)}
/* Login */
.login-wrap{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,var(--pri),var(--sec));z-index:1000;justify-content:center;align-items:center}
.login-wrap.on{display:flex}
.login-box{background:#fff;border-radius:16px;padding:40px;width:380px;box-shadow:var(--sh2);text-align:center}
.login-icon{font-size:48px;margin-bottom:16px}
.login-title{font-size:22px;font-weight:700;color:var(--tx1);margin-bottom:6px}
.login-desc{font-size:13px;color:var(--tx2);margin-bottom:28px}
.login-input{width:100%;padding:12px 16px;border:2px solid var(--brd);border-radius:var(--rs);font-size:15px;text-align:center;letter-spacing:4px;transition:.2s;margin-bottom:16px}
.login-input:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 4px rgba(255,107,157,.1)}
.login-btn{width:100%;padding:12px;border:none;border-radius:var(--rs);background:linear-gradient(135deg,var(--pri),var(--sec));color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:.2s}
.login-btn:hover{opacity:.9;transform:translateY(-1px)}
.login-btn:active{transform:translateY(0)}
.login-err{color:var(--err);font-size:12px;margin-top:8px;min-height:18px}
.login-remember{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:16px;font-size:12px;color:var(--tx2)}
.login-remember input{accent-color:var(--pri)}
/* User dropdown */
.user-menu{position:relative;display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 12px;border-radius:var(--rs);transition:.15s}
.user-menu:hover{background:rgba(255,255,255,.2)}
.user-menu-name{font-size:13px;color:#fff;font-weight:500}
.user-dropdown{display:none;position:absolute;top:100%;right:0;margin-top:4px;background:#fff;border-radius:var(--rs);box-shadow:var(--sh2);min-width:140px;z-index:200;overflow:hidden}
.user-dropdown.on{display:block}
.user-dropdown-item{padding:10px 16px;font-size:13px;color:var(--tx2);cursor:pointer;transition:.15s;display:flex;align-items:center;gap:8px}
.user-dropdown-item:hover{background:var(--bg);color:var(--tx1)}
@media(max-width:768px){.login-box{width:90%;padding:28px 20px}}
/* Responsive */
@media(max-width:768px){.side{width:60px}.side-logo h1,.side-logo p,.side-section,.side-item span,.side-footer{display:none}.side-item{justify-content:center;padding:10px;margin:2px 8px}.main{margin-left:60px;padding:16px}}
</style>
</head>
<body>

<!-- Login Screen -->
<div class="login-wrap on" id="loginScreen">
<div class="login-box">
<div class="login-icon">💕</div>
<div class="login-title">恋人空间管理后台</div>
<div class="login-desc">请输入管理密码登录</div>
<input class="login-input" id="loginPwd" type="password" placeholder="请输入密码" maxlength="20">
<button class="login-btn" onclick="doLogin()">登 录</button>
<div class="login-err" id="loginErr"></div>
<label class="login-remember"><input type="checkbox" id="loginRemember" checked> 记住登录状态</label>
</div>
</div>

<!-- Main App -->
<aside class="side" id="sideApp">
<div class="side-logo">
<div class="side-logo-icon">💕</div>
<div><h1>恋人空间</h1><p>管理后台</p></div>
</div>
<nav class="side-nav">
<div class="side-section">数据管理</div>
<a class="side-item on" data-t="dashboard"><i>📊</i><span>仪表盘</span></a>
<a class="side-item" data-t="users"><i>👥</i><span>用户管理</span></a>
<a class="side-item" data-t="couples"><i>💑</i><span>情侣管理</span></a>
<a class="side-item" data-t="diaries"><i>📝</i><span>日记管理</span></a>
<a class="side-item" data-t="wishes"><i>⭐</i><span>愿望管理</span></a>
<a class="side-item" data-t="anniversaries"><i>📅</i><span>纪念日</span></a>
<div class="side-section">功能模块</div>
<a class="side-item" data-t="bills"><i>💰</i><span>账单管理</span></a>
<a class="side-item" data-t="letters"><i>💌</i><span>情书管理</span></a>
<a class="side-item" data-t="albums"><i>📷</i><span>相册管理</span></a>
<a class="side-item" data-t="messages"><i>💬</i><span>消息日志</span></a>
<div class="side-section">系统</div>
<a class="side-item" data-t="status"><i>🖥️</i><span>服务状态</span></a>
<a class="side-item" data-t="database"><i>🗄️</i><span>数据库</span></a>
<a class="side-item" data-t="logs"><i>📋</i><span>操作日志</span></a>
</nav>
<div class="side-footer" style="display:flex;justify-content:space-between;align-items:center">
<span>v1.2.0</span>
<span style="cursor:pointer;color:var(--err);font-size:12px" onclick="doLogout()">退出登录</span>
</div>
</aside>

<main class="main" id="main"></main>

<div class="mo" id="modal"><div class="mo-c">
<div class="mo-h"><h3 id="moTitle"></h3><span class="mo-x" onclick="closeMo()">×</span></div>
<div id="moBody"></div>
<div class="fa"><button class="btn btn-g" onclick="closeMo()">取消</button><button class="btn btn-p" id="moSave">保存</button></div>
</div></div>

<script>
const API='/api';let curTab='dashboard',curDbTable='users',curDbPage=1;
const ADMIN_PWD='yiyi2024'; // 管理密码

// Auth
function checkLogin(){return localStorage.getItem('admin_logged_in')==='true'}
function doLogin(){
const pwd=document.getElementById('loginPwd').value;
const remember=document.getElementById('loginRemember').checked;
if(pwd!==ADMIN_PWD){document.getElementById('loginErr').textContent='密码错误，请重试';return;}
if(remember)localStorage.setItem('admin_logged_in','true');
document.getElementById('loginScreen').classList.remove('on');
loadDash();
}
function doLogout(){
if(!confirm('确定退出登录吗？'))return;
localStorage.removeItem('admin_logged_in');
location.reload();
}
document.getElementById('loginPwd').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
if(checkLogin())document.getElementById('loginScreen').classList.remove('on');

// Utils
function toast(m,t=''){const d=document.createElement('div');d.className='toast '+t;d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),3000)}
async function f(p){try{const r=await fetch(API+p);const j=await r.json();return j.success?j.data:null}catch(e){return null}}
async function fm(p,m,b){try{const r=await fetch(API+p,{method:m,headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):undefined});return(await r.json()).success}catch(e){return false}}
function fd(s){if(!s)return'-';const d=new Date(s);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function ft(s){if(!s)return'-';const d=new Date(s);return d.toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}
function days(s){if(!s)return'-';const t=new Date(s),n=new Date();t.setHours(0,0,0,0);n.setHours(0,0,0,0);const d=Math.ceil((t-n)/864e5);return d<0?'已过':d}
const moods={happy:'😊开心',love:'🥰甜蜜',sad:'😢难过',angry:'😤生气',miss:'🥺想你',shy:'😳害羞'};
const types={love:'💕恋爱',birthday:'🎂生日',custom:'📌自定义'};

// Modal
function openMo(t,body,save){document.getElementById('moTitle').textContent=t;document.getElementById('moBody').innerHTML=body;document.getElementById('modal').classList.add('on');document.getElementById('moSave').onclick=save}
function closeMo(){document.getElementById('modal').classList.remove('on')}
document.getElementById('modal').onclick=e=>{if(e.target===document.getElementById('modal'))closeMo()};

// Nav
document.querySelectorAll('.side-item').forEach(b=>b.onclick=()=>{
document.querySelectorAll('.side-item').forEach(x=>x.classList.remove('on'));b.classList.add('on');
curTab=b.dataset.t;loadTab(curTab)});

// Layout helpers
const M=document.getElementById('main');
function mkTop(title,extra){return`<div class="topbar"><h2>${title}</h2>${extra?`<div class="topbar-right">${extra}</div>`:''}</div>`}
function mkStats(items){return`<div class="cards">${items.map(i=>`<div class="stat"><div class="stat-top"><div class="stat-icon ${i.c}">${i.e}</div></div><div class="stat-label">${i.l}</div><div class="stat-value">${i.v}</div>${i.s?`<div class="stat-sub">${i.s}</div>`:''}</div>`).join('')}</div>`}
function mkCard(title,extra,body){return`<div class="card"><div class="card-h"><div class="card-t">${title}</div>${extra?`<div class="card-acts">${extra}</div>`:''}</div><div class="card-b">${body}</div></div>`}
function mkTable(heads,rows){return`<table><thead><tr>${heads.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.length?rows.join(''):`<tr><td colspan="${heads.length}"><div class="empty"><i>📭</i><p>暂无数据</p></div></td></tr>`}</tbody></table>`}

// Tab loader
async function loadTab(t){
M.innerHTML='<div class="ld"><div class="sp"></div></div>';
const loader={dashboard:loadDash,users:loadUsers,couples:loadCouples,diaries:loadDiaries,wishes:loadWishes,anniversaries:loadAnni,bills:loadBills,letters:loadLetters,albums:loadAlbums,messages:loadMsgs,status:loadStatus,database:loadDatabase,logs:loadLogs};
if(loader[t])await loader[t]();
}

// ===== Dashboard =====
async function loadDash(){
const[u,c,d,w,a]=await Promise.all([f('/admin/users'),f('/admin/couples'),f('/admin/diaries'),f('/admin/wishes'),f('/admin/anniversaries')]);
const bc=c?.filter(x=>x.user2_id).length||0;
const cw=w?.filter(x=>x.is_completed).length||0;
M.innerHTML=mkTop('仪表盘','<span class="badge badge-ok"><span class="dot dot-ok"></span>系统运行正常</span>')+
mkStats([
{e:'👥',l:'注册用户',v:u?.length||0,c:'pk',s:'累计注册'},
{e:'💑',l:'绑定情侣',v:bc,c:'pp',s:`${c?.length||0} 对情侣`},
{e:'📝',l:'日记总数',v:d?.length||0,c:'bl',s:'甜蜜记录'},
{e:'⭐',l:'愿望达成',v:`${cw}/${w?.length||0}`,c:'gn',s:'完成率 '+(w?.length?Math.round(cw/w.length*100):0)+'%'},
{e:'📅',l:'纪念日',v:a?.length||0,c:'og',s:'重要日子'}
])+
mkCard('📈 数据概览','',`<div style="padding:20px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
<div style="background:linear-gradient(135deg,#FFF0F5,#FFE0EB);border-radius:10px;padding:20px;text-align:center"><div style="font-size:36px;margin-bottom:8px">💑</div><div style="font-size:24px;font-weight:700;color:#D63384">${bc}</div><div style="font-size:12px;color:#8B4558;margin-top:4px">已绑定情侣</div></div>
<div style="background:linear-gradient(135deg,#E6F9F1,#D0F5E9);border-radius:10px;padding:20px;text-align:center"><div style="font-size:36px;margin-bottom:8px">✨</div><div style="font-size:24px;font-weight:700;color:#00B894">${cw}</div><div style="font-size:12px;color:#1E6F50;margin-top:4px">愿望已达成</div></div>
<div style="background:linear-gradient(135deg,#F3EEFF,#E8DEFF);border-radius:10px;padding:20px;text-align:center"><div style="font-size:36px;margin-bottom:8px">📝</div><div style="font-size:24px;font-weight:700;color:#6C5CE7">${d?.length||0}</div><div style="font-size:12px;color:#5B4A8A;margin-top:4px">日记总数</div></div>
</div>`)}

// ===== Users =====
async function loadUsers(){
const d=await f('/admin/users')||[];
M.innerHTML=mkTop('用户管理',`<span class="badge badge-pri">${d.length} 用户</span>`)+
mkCard('用户列表',`<div class="search"><input placeholder="搜索用户..." oninput="filterT(this,'uBody')"></div>`,
mkTable(['用户','OpenID','创建时间','操作'],d.map(u=>`<tr>

if(!tables.length){M.innerHTML=mkTop('数据库管理')+'<div class="empty"><i>🗄️</i><p>无法连接数据库</p></div>';return;}
const totalRows=tables.reduce((s,t)=>s+(t.count||0),0);
M.innerHTML=mkTop('数据库管理',`<span class="badge badge-pri">${tables.length} 张表 · ${totalRows} 条记录</span>`)+
`<div class="card"><div class="card-h"><div class="card-t">表数据浏览</div>
<div class="card-acts" style="gap:4px;flex-wrap:wrap">${tables.map(t=>`<button class="btn btn-sm ${t.name===curDbTable?'btn-p':'btn-g'}" onclick="switchDbTable('${t.name}')">${t.name} <span style="color:var(--tx3)">${t.count}</span></button>`).join('')}</div></div>
<div class="card-b"><div class="sql-wrap"><input id="sqlInput" placeholder="输入SQL查询（仅SELECT）..." onkeydown="if(event.key==='Enter')runSql()"><button class="btn btn-p" onclick="runSql()">执行</button></div>
<div id="dbContent"><div class="ld"><div class="sp"></div></div></div></div></div>`;
loadTableData(curDbTable);}

function switchDbTable(t){curDbTable=t;curDbPage=1;loadDatabase();}

async function loadTableData(table){
const el=document.getElementById('dbContent');if(!el)return;
el.innerHTML='<div class="ld"><div class="sp"></div></div>';
const d=await fetch(API+`/admin/db/query/${table}?page=${curDbPage}&limit=15`).then(r=>r.json());
if(!d.success||!d.data){el.innerHTML='<div class="empty"><p>查询失败</p></div>';return;}
const{columns,rows,pagination}=d.data;
el.innerHTML=`<div style="margin-bottom:10px;font-size:12px;color:var(--tx2)">共 ${pagination.total} 条记录 · 第 ${pagination.page}/${pagination.totalPages} 页</div>`+
mkTable(columns,rows.map(r=>`<tr>${columns.map(c=>`<td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${String(r[c]||'')}">${r[c]===null?'<span style=color:var(--tx3)>NULL</span>':typeof r[c]==='object'?JSON.stringify(r[c]):String(r[c])}</td>`).join('')}</tr>`))+
(pagination.totalPages>1?`<div style="display:flex;justify-content:center;align-items:center;gap:8px;padding:14px"><button class="btn btn-sm btn-g" ${pagination.page<=1?'disabled':''} onclick="goDbPage(${pagination.page-1})">‹ 上一页</button><span style="font-size:12px;color:var(--tx2)">${pagination.page} / ${pagination.totalPages}</span><button class="btn btn-sm btn-g" ${pagination.page>=pagination.totalPages?'disabled':''} onclick="goDbPage(${pagination.page+1})">下一页 ›</button></div>`:'');}

function goDbPage(p){curDbPage=p;loadTableData(curDbTable);}

async function runSql(){
const sql=document.getElementById('sqlInput')?.value?.trim();
if(!sql){toast('请输入SQL语句','er');return;}
const el=document.getElementById('dbContent');el.innerHTML='<div class="ld"><div class="sp"></div></div>';
try{
const r=await fetch(API+'/admin/db/sql',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sql})});
const d=await r.json();
if(!d.success){el.innerHTML=`<div style="background:#FEE;padding:12px;border-radius:8px;color:var(--err);font-size:13px">❌ ${d.message}</div>`;return;}
el.innerHTML=`<div style="margin-bottom:10px;font-size:12px;color:var(--tx2)">✅ 查询成功 · ${d.data.rowCount} 行 · ${d.data.duration}ms</div>`+
mkTable(d.data.columns,d.data.rows.map(r=>`<tr>${d.data.columns.map(c=>`<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${String(r[c]||'')}">${r[c]===null?'NULL':typeof r[c]==='object'?JSON.stringify(r[c]):String(r[c])}</td>`).join('')}</tr>`));
}catch(e){el.innerHTML=`<div style="background:#FEE;padding:12px;border-radius:8px;color:var(--err);font-size:13px">❌ ${e.message}</div>`;}}

// ===== Logs =====
async function loadLogs(){
const d=await f('/admin/logs?limit=100')||[];
const srcIcon={message:'💬',diary:'📝',user:'👤',couple:'💑'};
const srcBadge={message:'info',diary:'info',user:'pri',couple:'pri'};
M.innerHTML=mkTop('操作日志',`<span class="badge badge-pri">${d.length} 条</span>`)+
mkCard('最近操作',`<div class="search"><input placeholder="搜索日志..." oninput="filterT(this,'logBody')"></div>`,
mkTable(['类型','详情','时间'],d.map(l=>`<tr>
<td><span class="badge badge-${srcBadge[l.source]||'info'}">${srcIcon[l.source]||'📋'} ${l.source}</span></td>
<td>${l.detail||l.author||'-'}</td>
<td style="color:var(--tx2)">${ft(l.time)}</td>
</tr>`)));}

// ===== Shared =====
async function delItem(p,n){if(!confirm(`确定删除该${n}吗？此操作不可恢复。`))return;if(await fm(p,'DELETE')){toast('删除成功','ok');loadTab(curTab)}else toast('删除失败','er')}
function filterT(el,id){const s=el.value.toLowerCase();document.querySelectorAll('#'+id+' tr').forEach(r=>r.style.display=r.textContent.toLowerCase().includes(s)?'':'none')}

// Init
if(checkLogin())loadDash();
</script>
</body>
</html>
