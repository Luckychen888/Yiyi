<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>恋人空间 - 管理后台</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💕</text></svg>">
<style>
:root{--pri:#FF6B9D;--pri-l:#FF8FB1;--pri-d:#E55A8A;--sec:#A29BFE;--acc:#74B9FF;--ok:#10B981;--warn:#F59E0B;--err:#EF4444;--bg:#F8FAFC;--card:#FFF;--tx1:#0F172A;--tx2:#64748B;--tx3:#94A3B8;--brd:#E2E8F0;--brd-l:#F1F5F9;--sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);--sh2:0 10px 40px rgba(0,0,0,.12);--r:12px;--rs:8px;--ease:cubic-bezier(.4,0,.2,1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--tx1);min-height:100vh;display:flex}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

.side{width:220px;background:#fff;border-right:1px solid var(--brd);position:fixed;top:0;bottom:0;left:0;z-index:100;display:flex;flex-direction:column;transition:width .3s var(--ease)}
.side-logo{padding:20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--brd-l)}
.side-logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--pri),var(--sec));border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;animation:pulse 3s ease-in-out infinite}
.side-logo-icon svg{width:22px;height:22px;color:#fff}
.side-logo h1{font-size:16px;font-weight:700;color:var(--tx1)}
.side-logo p{font-size:11px;color:var(--tx2);margin-top:2px}
.side-nav{flex:1;padding:12px 0;overflow-y:auto}
.side-section{padding:8px 20px;font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-top:8px}
.side-item{display:flex;align-items:center;gap:10px;padding:10px 16px;margin:2px 8px;border-radius:var(--rs);cursor:pointer;transition:all .2s var(--ease);font-size:13px;color:var(--tx2);text-decoration:none}
.side-item:hover{background:var(--brd-l);color:var(--tx1);transform:translateX(2px)}
.side-item.on{background:linear-gradient(135deg,rgba(255,107,157,.1),rgba(162,155,254,.1));color:var(--pri);font-weight:600;box-shadow:inset 3px 0 0 var(--pri)}
.side-item svg{width:18px;height:18px;flex-shrink:0;transition:transform .2s var(--ease)}
.side-item:hover svg{transform:scale(1.1)}
.side-item.on svg{filter:drop-shadow(0 0 4px rgba(255,107,157,.4))}
.side-footer{padding:16px;border-top:1px solid var(--brd-l);font-size:11px;color:var(--tx3);text-align:center}

.main{flex:1;margin-left:220px;padding:24px;min-height:100vh;animation:fadeIn .4s var(--ease)}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;animation:slideIn .5s var(--ease)}
.topbar h2{font-size:22px;font-weight:700;color:var(--tx1)}
.topbar-right{display:flex;align-items:center;gap:12px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;transition:all .2s var(--ease)}
.badge:hover{transform:translateY(-1px)}
.badge-ok{background:#ECFDF5;color:var(--ok)}.badge-err{background:#FEF2F2;color:var(--err)}.badge-warn{background:#FFFBEB;color:#D97706}.badge-info{background:#EFF6FF;color:#2563EB}.badge-pri{background:linear-gradient(135deg,#FFF0F5,#FFE0EB);color:var(--pri)}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;animation:pulse 2s ease-in-out infinite}
.dot-ok{background:var(--ok)}.dot-err{background:var(--err)}.dot-warn{background:var(--warn)}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat{background:#fff;border-radius:var(--r);padding:20px;box-shadow:var(--sh);border:1px solid var(--brd-l);transition:all .3s var(--ease);animation:fadeUp .5s var(--ease) both}
.stat:nth-child(1){animation-delay:.05s}.stat:nth-child(2){animation-delay:.1s}.stat:nth-child(3){animation-delay:.15s}.stat:nth-child(4){animation-delay:.2s}.stat:nth-child(5){animation-delay:.25s}
.stat:hover{box-shadow:var(--sh2);transform:translateY(-4px)}
.stat-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.stat-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;transition:transform .3s var(--ease)}
.stat:hover .stat-icon{transform:scale(1.1) rotate(-5deg)}
.stat-icon svg{width:22px;height:22px}
.stat-icon.pk{background:#FFF0F5;color:var(--pri)}.stat-icon.pp{background:#F3EEFF;color:var(--sec)}.stat-icon.bl{background:#EFF6FF;color:var(--acc)}.stat-icon.gn{background:#ECFDF5;color:var(--ok)}.stat-icon.og{background:#FFFBEB;color:#D97706}
.stat-label{font-size:12px;color:var(--tx2);margin-bottom:4px}
.stat-value{font-size:28px;font-weight:700;color:var(--tx1);line-height:1.1}
.stat-sub{font-size:11px;color:var(--tx3);margin-top:6px}

.card{background:#fff;border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--brd-l);margin-bottom:20px;animation:fadeUp .5s var(--ease) both}
.card-h{padding:16px 20px;border-bottom:1px solid var(--brd-l);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.card-t{font-size:15px;font-weight:600;color:var(--tx1);display:flex;align-items:center;gap:8px}
.card-t svg{width:18px;height:18px;color:var(--pri)}
.card-acts{display:flex;gap:8px;align-items:center}
.card-b{padding:0 20px 20px;overflow-x:auto}

table{width:100%;border-collapse:collapse}
th{padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--brd);background:var(--bg);white-space:nowrap}
td{padding:12px;font-size:13px;border-bottom:1px solid var(--brd-l);vertical-align:middle;transition:background .15s var(--ease)}
tbody tr{transition:all .2s var(--ease)}
tbody tr:hover{background:#F8FAFC;transform:scale(1.002)}

.search{position:relative}
.search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--tx3);pointer-events:none;transition:color .2s var(--ease)}
.search input{padding:8px 12px 8px 36px;border:1px solid var(--brd);border-radius:var(--rs);font-size:13px;width:220px;background:var(--bg);transition:all .3s var(--ease)}
.search input:focus{outline:none;border-color:var(--pri);background:#fff;box-shadow:0 0 0 3px rgba(255,107,157,.1)}
.search input:focus+svg,.search:focus-within svg{color:var(--pri)}

.btn{padding:7px 14px;border:none;border-radius:var(--rs);cursor:pointer;font-size:12px;font-weight:500;transition:all .2s var(--ease);display:inline-flex;align-items:center;gap:5px}
.btn svg{width:14px;height:14px}
.btn-p{background:var(--pri);color:#fff}.btn-p:hover{background:var(--pri-d);transform:translateY(-1px);box-shadow:0 4px 12px rgba(255,107,157,.3)}
.btn-g{background:var(--bg);color:var(--tx2);border:1px solid var(--brd)}.btn-g:hover{background:var(--brd-l);border-color:#CBD5E1}
.btn-d{background:#FEF2F2;color:var(--err);border:1px solid #FECACA}.btn-d:hover{background:#FEE2E2;transform:translateY(-1px)}
.btn-s{background:#ECFDF5;color:var(--ok);border:1px solid #A7F3D0}.btn-s:hover{background:#D1FAE5;transform:translateY(-1px)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-acts{display:flex;gap:4px}

.av{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--brd-l);transition:all .2s var(--ease)}
tr:hover .av{border-color:var(--pri);box-shadow:0 0 0 3px rgba(255,107,157,.15)}
.av-sm{width:28px;height:28px}

.empty{text-align:center;padding:60px 20px;color:var(--tx3)}
.empty svg{width:56px;height:56px;margin-bottom:16px;opacity:.4}
.empty p{font-size:14px;color:var(--tx2)}

.ld{display:flex;align-items:center;justify-content:center;padding:60px}
.sp{width:32px;height:32px;border:3px solid var(--brd);border-top-color:var(--pri);border-radius:50%;animation:spin .7s linear infinite}

.mo{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);justify-content:center;align-items:center;z-index:200;backdrop-filter:blur(6px);animation:fadeIn .2s var(--ease)}
.mo.on{display:flex}
.mo-c{background:#fff;border-radius:16px;padding:28px;width:90%;max-width:520px;max-height:85vh;overflow-y:auto;box-shadow:var(--sh2);animation:scaleIn .3s var(--ease)}
.mo-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mo-h h3{font-size:18px;font-weight:700}
.mo-x{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx3);border-radius:var(--rs);transition:all .2s var(--ease);background:var(--bg)}
.mo-x:hover{background:var(--err);color:#fff}
.mo-x svg{width:18px;height:18px}
.fg{margin-bottom:14px}
.fg label{display:block;margin-bottom:5px;font-size:12px;color:var(--tx2);font-weight:600}
.fg input,.fg textarea,.fg select{width:100%;padding:10px 14px;border:1px solid var(--brd);border-radius:var(--rs);font-size:13px;transition:all .2s var(--ease)}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px rgba(255,107,157,.1)}
.fg textarea{resize:vertical;min-height:80px}
.fa{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--brd-l)}

.sql-wrap{display:flex;gap:8px;margin-bottom:14px}
.sql-wrap input{flex:1;padding:10px 14px;border:1px solid var(--brd);border-radius:var(--rs);font-size:13px;font-family:'SF Mono',Monaco,monospace;transition:all .2s var(--ease)}
.sql-wrap input:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px rgba(255,107,157,.1)}

.tab-bar{display:flex;gap:4px;margin-bottom:16px;border-bottom:2px solid var(--brd);padding-bottom:0}
.tab-btn{padding:10px 16px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--tx2);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s var(--ease)}
.tab-btn:hover{color:var(--tx1)}
.tab-btn.on{color:var(--pri);border-bottom-color:var(--pri)}

.toast{position:fixed;top:20px;right:20px;padding:12px 20px;background:var(--tx1);color:#fff;border-radius:var(--rs);font-size:13px;z-index:300;animation:slideIn .3s var(--ease);box-shadow:var(--sh2);display:flex;align-items:center;gap:8px}
.toast svg{width:16px;height:16px}
.toast.ok{background:var(--ok)}.toast.er{background:var(--err)}

.login-wrap{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,var(--pri),var(--sec));z-index:1000;justify-content:center;align-items:center}
.login-wrap.on{display:flex}
.login-box{background:#fff;border-radius:20px;padding:44px;width:380px;box-shadow:var(--sh2);text-align:center;animation:scaleIn .5s var(--ease)}
.login-icon{width:64px;height:64px;margin:0 auto 20px;background:linear-gradient(135deg,var(--pri),var(--sec));border-radius:50%;display:flex;align-items:center;justify-content:center;animation:pulse 2s ease-in-out infinite}
.login-icon svg{width:32px;height:32px;color:#fff}
.login-title{font-size:22px;font-weight:700;color:var(--tx1);margin-bottom:6px}
.login-desc{font-size:13px;color:var(--tx2);margin-bottom:28px}
.login-input{width:100%;padding:14px 18px;border:2px solid var(--brd);border-radius:var(--rs);font-size:15px;text-align:center;letter-spacing:4px;transition:all .3s var(--ease);margin-bottom:16px}
.login-input:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 4px rgba(255,107,157,.15)}
.login-btn{width:100%;padding:14px;border:none;border-radius:var(--rs);background:linear-gradient(135deg,var(--pri),var(--sec));color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:all .3s var(--ease);display:flex;align-items:center;justify-content:center;gap:8px}
.login-btn svg{width:18px;height:18px}
.login-btn:hover{opacity:.9;transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,107,157,.35)}
.login-btn:active{transform:translateY(0)}
.login-err{color:var(--err);font-size:12px;margin-top:8px;min-height:18px}
.login-remember{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:16px;font-size:12px;color:var(--tx2)}
.login-remember input{accent-color:var(--pri)}

.user-menu{position:relative;display:flex;align-items:center;gap:8px;cursor:pointer;padding:6px 12px;border-radius:var(--rs);transition:.15s var(--ease)}
.user-menu:hover{background:rgba(255,255,255,.2)}
.user-menu-name{font-size:13px;color:#fff;font-weight:500}
.user-dropdown{display:none;position:absolute;top:100%;right:0;margin-top:4px;background:#fff;border-radius:var(--rs);box-shadow:var(--sh2);min-width:140px;z-index:200;overflow:hidden;animation:slideIn .2s var(--ease)}
.user-dropdown.on{display:block}
.user-dropdown-item{padding:10px 16px;font-size:13px;color:var(--tx2);cursor:pointer;transition:.15s var(--ease);display:flex;align-items:center;gap:8px}
.user-dropdown-item:hover{background:var(--bg);color:var(--tx1)}

@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(-60px) rotate(180deg);opacity:0}}

@media(max-width:768px){.login-box{width:90%;padding:28px 20px}}
@media(max-width:768px){.side{width:60px}.side-logo h1,.side-logo p,.side-section,.side-item span,.side-footer span:first-child{display:none}.side-item{justify-content:center;padding:10px;margin:2px 8px}.side-item svg{width:20px;height:20px}.main{margin-left:60px;padding:16px}}
</style>
</head>
<body>

<div class="login-wrap on" id="loginScreen">
<div class="login-box">
<div class="login-icon">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
</div>
<div class="login-title">恋人空间管理后台</div>
<div class="login-desc">请输入管理密码登录</div>
<input class="login-input" id="loginPwd" type="password" placeholder="请输入密码" maxlength="20">
<button class="login-btn" onclick="doLogin()">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
登 录
</button>
<div class="login-err" id="loginErr"></div>
<label class="login-remember"><input type="checkbox" id="loginRemember" checked> 记住登录状态</label>
</div>
</div>

<aside class="side" id="sideApp">
<div class="side-logo">
<div class="side-logo-icon">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
</div>
<div><h1>恋人空间</h1><p>管理后台</p></div>
</div>
<nav class="side-nav">
<div class="side-section">数据管理</div>
<a class="side-item on" data-t="dashboard">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
<span>仪表盘</span></a>
<a class="side-item" data-t="users">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
<span>用户管理</span></a>
<a class="side-item" data-t="couples">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
<span>情侣管理</span></a>
<a class="side-item" data-t="diaries">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
<span>日记管理</span></a>
<a class="side-item" data-t="wishes">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
<span>愿望管理</span></a>
<a class="side-item" data-t="anniversaries">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
<span>纪念日</span></a>
<div class="side-section">功能模块</div>
<a class="side-item" data-t="bills">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
<span>账单管理</span></a>
<a class="side-item" data-t="letters">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
<span>情书管理</span></a>
<a class="side-item" data-t="albums">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
<span>相册管理</span></a>
<a class="side-item" data-t="messages">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
<span>消息日志</span></a>
<div class="side-section">系统</div>
<a class="side-item" data-t="status">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
<span>服务状态</span></a>
<a class="side-item" data-t="database">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>

function checkLogin(){return localStorage.getItem('admin_logged_in')==='true'}

if(pwd!==ADMIN_PWD){document.getElementById('loginErr').textContent='密码错误，请重试';return;}
if(remember)localStorage.setItem('admin_logged_in','true');
document.getElementById('loginScreen').classList.remove('on');
loadDash();
}
function doLogout(){
if(!confirm('确定退出登录吗？'))return;

}

function toast(m,t=''){const d=document.createElement('div');d.className='toast '+t;d.innerHTML=(t==='ok'?icon.check:icon.alert)+' '+m;document.body.appendChild(d);setTimeout(()=>{d.style.opacity='0';d.style.transform='translateY(-10px)';d.style.transition='all .3s';setTimeout(()=>d.remove(),300)},3000)}

async function loadDatabase(){
const tables=await f('/admin/db/tables')||[];
if(!tables.length){M.innerHTML=mkTop('数据库管理')+'<div class="empty">'+icon.database+'<p>无法连接数据库</p></div>';return;}
const totalRows=tables.reduce((s,t)=>s+(t.count||0),0);
M.innerHTML=mkTop('数据库管理',`<span class="badge badge-pri">${icon.database} ${tables.length} 张表 · ${totalRows} 条记录</span>`)+
`<div class="card"><div class="card-h"><div class="card-t">${icon.database} 表数据浏览</div>
<div class="card-acts" style="gap:4px;flex-wrap:wrap">${tables.map(t=>`<button class="btn btn-sm ${t.name===curDbTable?'btn-p':'btn-g'}" onclick="switchDbTable('${t.name}')">${t.name} <span style="color:var(--tx3)">${t.count}</span></button>`).join('')}</div></div>
<div class="card-b"><div class="sql-wrap"><input id="sqlInput" placeholder="输入SQL查询（仅SELECT）..." onkeydown="if(event.key==='Enter')runSql()"><button class="btn btn-p" onclick="runSql()">${icon.check} 执行</button></div>
<div id="dbContent"><div class="ld"><div class="sp"></div></div></div></div></div>`;
loadTableData(curDbTable);}

function switchDbTable(t){curDbTable=t;curDbPage=1;loadDatabase();}

async function loadTableData(table){
const el=document.getElementById('dbContent');if(!el)return;
el.innerHTML='<div class="ld"><div class="sp"></div></div>';
const d=await fetch(API+`/admin/db/query/${table}?page=${curDbPage}&limit=15`).then(r=>r.json());
if(!d.success||!d.data){el.innerHTML='<div class="empty"><p>查询失败</p></div>';return;}
const{columns,rows,pagination}=d.data;
el.innerHTML=`<div style="margin-bottom:10px;font-size:12px;color:var(--tx2)">共 ${pagination.total} 条记录 · 第 ${pagination.page}/${pagination.totalPages} 页</div>`+
mkTable(columns,rows.map(r=>`<tr>${columns.map(c=>`<td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${String(r[c]||'')}">${r[c]===null?'<span style=color:var(--tx3)>NULL</span>':typeof r[c]==='object'?JSON.stringify(r[c]):String(r[c])}</td>`).join('')}</tr>`))+
(pagination.totalPages>1?`<div style="display:flex;justify-content:center;align-items:center;gap:8px;padding:14px"><button class="btn btn-sm btn-g" ${pagination.page<=1?'disabled':''} onclick="goDbPage(${pagination.page-1})">‹ 上一页</button><span style="font-size:12px;color:var(--tx2)">${pagination.page} / ${pagination.totalPages}</span><button class="btn btn-sm btn-g" ${pagination.page>=pagination.totalPages?'disabled':''} onclick="goDbPage(${pagination.page+1})">下一页 ›</button></div>`:'');}

function goDbPage(p){curDbPage=p;loadTableData(curDbTable);}

async function runSql(){
const sql=document.getElementById('sqlInput')?.value?.trim();
if(!sql){toast('请输入SQL语句','er');return;}
const el=document.getElementById('dbContent');el.innerHTML='<div class="ld"><div class="sp"></div></div>';
try{
const r=await fetch(API+'/admin/db/sql',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({sql})});
const d=await r.json();
if(!d.success){el.innerHTML=`<div style="background:#FEF2F2;padding:12px;border-radius:8px;color:var(--err);font-size:13px;display:flex;align-items:center;gap:8px">${icon.alert} ${d.message}</div>`;return;}
el.innerHTML=`<div style="margin-bottom:10px;font-size:12px;color:var(--ok);display:flex;align-items:center;gap:6px">${icon.check} 查询成功 · ${d.data.rowCount} 行 · ${d.data.duration}ms</div>`+
mkTable(d.data.columns,d.data.rows.map(r=>`<tr>${d.data.columns.map(c=>`<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${String(r[c]||'')}">${r[c]===null?'NULL':typeof r[c]==='object'?JSON.stringify(r[c]):String(r[c])}</td>`).join('')}</tr>`));
}catch(e){el.innerHTML=`<div style="background:#FEF2F2;padding:12px;border-radius:8px;color:var(--err);font-size:13px;display:flex;align-items:center;gap:8px">${icon.alert} ${e.message}</div>`;}}

async function delItem(p,n){if(!confirm(`确定删除该${n}吗？此操作不可恢复。`))return;if(await fm(p,'DELETE')){toast('删除成功','ok');loadTab(curTab)}else toast('删除失败','er')}
function filterT(el,id){const s=el.value.toLowerCase();document.querySelectorAll('#'+id+' tr').forEach(r=>r.style.display=r.textContent.toLowerCase().includes(s)?'':'none')}

if(checkLogin())loadDash();
</script>
