<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恋人空间 - 管理后台</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💕</text></svg>">
    <style>
        :root {
            --primary: #FF6B9D;
            --primary-light: #FF8FB1;
            --primary-dark: #E55A8A;
            --secondary: #A29BFE;
            --accent: #74B9FF;
            --success: #00B894;
            --warning: #FDCB6E;
            --danger: #FF7675;
            --bg: #FFF5F7;
            --card: #FFFFFF;
            --text: #2D3436;
            --text-secondary: #636E72;
            --text-muted: #B2BEC3;
            --border: #F0E6EA;
            --shadow: 0 4px 24px rgba(255, 107, 157, 0.12);
            --shadow-lg: 0 8px 40px rgba(255, 107, 157, 0.18);
            --radius: 16px;
            --radius-sm: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-lg);
        }

        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 32px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.2);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            backdrop-filter: blur(10px);
        }

        .logo h1 {
            font-size: 22px;
            font-weight: 700;
            color: white;
            letter-spacing: -0.5px;
        }

        .logo p {
            font-size: 13px;
            color: rgba(255,255,255,0.8);
            margin-top: 2px;
        }

        .header-status {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            color: white;
            font-size: 13px;
            backdrop-filter: blur(10px);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #00FF88;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .nav {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .nav::-webkit-scrollbar { display: none; }

        .nav button {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.9);
            cursor: pointer;
            transition: all 0.25s;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            backdrop-filter: blur(10px);
        }

        .nav button:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-1px);
        }

        .nav button.active {
            background: white;
            color: var(--primary);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }

        /* Main Layout */
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 32px;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Stats Grid */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 16px;
        }

        .stat-icon.pink { background: linear-gradient(135deg, #FFE0EB, #FFC1D3); }
        .stat-icon.purple { background: linear-gradient(135deg, #E8DEFF, #D1C1FF); }
        .stat-icon.blue { background: linear-gradient(135deg, #D6EEFF, #B8DCFF); }
        .stat-icon.green { background: linear-gradient(135deg, #D0F5E9, #A8E6CF); }
        .stat-icon.orange { background: linear-gradient(135deg, #FFE8CC, #FFD9A8); }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text);
            line-height: 1;
        }

        .stat-change {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 10px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .stat-change.up { background: #E8F8F5; color: var(--success); }
        .stat-change.down { background: #FFE8E8; color: var(--danger); }

        /* Content Card */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            margin-bottom: 24px;
        }

        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-input {
            padding: 10px 16px 10px 40px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            width: 280px;
            transition: all 0.25s;
            background: var(--bg);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(255, 107, 157, 0.1);
        }

        .search-wrap {
            position: relative;
        }

        .search-wrap::before {
            content: '🔍';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
        }

        /* Table */
        .table-wrap { padding: 0 24px 24px; overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            padding: 14px 12px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border);
            background: var(--bg);
        }

        td {
            padding: 14px 12px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tr:hover td { background: #FFF8FA; }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-success { background: #E8F8F5; color: var(--success); }
        .badge-warning { background: #FFF8E1; color: #E17055; }
        .badge-info { background: #E3F2FD; color: #1976D2; }
        .badge-danger { background: #FFEBEE; color: var(--danger); }

        /* Buttons */
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-sm { padding: 5px 12px; font-size: 12px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { opacity: 0.9; }
        .btn-ghost { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
        .btn-ghost:hover { background: var(--primary); color: white; }

        /* Empty State */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-icon { font-size: 56px; margin-bottom: 16px; }
        .empty-text { font-size: 16px; margin-bottom: 8px; color: var(--text-secondary); }
        .empty-desc { font-size: 13px; }

        /* Loading */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* System Config */
        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 24px;
        }

        .config-card {
            background: var(--bg);
            border-radius: var(--radius);
            padding: 24px;
        }

        .config-card h3 {
            font-size: 15px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .config-item {
            margin-bottom: 12px;
        }

        .config-item label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .config-item input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 13px;
            background: white;
        }

        .config-item input:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 16px 24px;
            background: var(--text);
            color: white;
            border-radius: var(--radius-sm);
            font-size: 14px;
            z-index: 1000;
            animation: slideIn 0.3s;
            box-shadow: var(--shadow-lg);
        }

        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-inner { padding: 16px 20px; }
            .main { padding: 16px 20px; }
            .stats { grid-template-columns: repeat(2, 1fr); }
            .search-input { width: 200px; }
            .config-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="header-top">
                <div class="logo">
                    <div class="logo-icon">💕</div>
                    <div>
                        <h1>恋人空间</h1>
                        <p>管理后台 · Administration</p>
                    </div>
                </div>
                <div class="header-status">
                    <div class="status-pill">
                        <div class="status-dot"></div>
                        <span id="statusText">连接中...</span>
                    </div>
                </div>
            </div>
            <nav class="nav">
                <button class="active" data-tab="dashboard">📊 仪表盘</button>
                <button data-tab="users">👥 用户</button>
                <button data-tab="couples">💑 情侣</button>
                <button data-tab="diaries">📝 日记</button>
                <button data-tab="wishes">⭐ 愿望</button>
                <button data-tab="anniversaries">📅 纪念日</button>
                <button data-tab="messages">💬 消息</button>
                <button data-tab="system">⚙️ 系统</button>

        </div>
    </header>

    <main class="main">
        <!-- 仪表盘 -->

            <div class="stats">

                </div>
                <div class="stat-card">
                    <div class="stat-icon blue">📝</div>

                    <div class="stat-value" id="statDiaries">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green">⭐</div>
                    <div class="stat-label">愿望总数</div>
                    <div class="stat-value" id="statWishes">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon orange">📅</div>
                    <div class="stat-label">纪念日</div>
                    <div class="stat-value" id="statAnniversaries">-</div>

            </div>

            <div class="card">
                <div class="card-header">

                </div>
                <div class="table-wrap">
                    <div id="dashboardContent">

                    </div>
                </div>
            </div>
        </div>

        <!-- 用户管理 -->
        <div id="users" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">👥 用户列表</div>
                    <div class="search-wrap">
                        <input class="search-input" placeholder="搜索用户..." id="searchUsers">
                    </div>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>

                                <th>用户</th>

                    <div class="search-wrap">

                    </div>
                </div>
                <div class="table-wrap">

                            <tr><td colspan="6"><div class="loading"><div class="spinner"></div></div></td></tr>

        <!-- 日记管理 -->
        <div id="diaries" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">📝 日记列表</div>
                    <div class="search-wrap">
                        <input class="search-input" placeholder="搜索日记..." id="searchDiaries">
                    </div>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>作者</th>
                                <th>内容</th>
                                <th>心情</th>
                                <th>点赞</th>

                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="diariesBody">
                            <tr><td colspan="7"><div class="loading"><div class="spinner"></div></div></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 愿望管理 -->
        <div id="wishes" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <div class="card-title">⭐ 愿望列表</div>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>

                                <th>标题</th>

        <!-- 纪念日管理 -->

                <div class="card-header">
                    <div class="card-title">📅 纪念日列表</div>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>标题</th>
                                <th>日期</th>
                                <th>类型</th>
                                <th>提醒</th>
                                <th>倒计时</th>

                        <tbody id="anniBody">
                            <tr><td colspan="5"><div class="loading"><div class="spinner"></div></div></td></tr>

        <!-- 消息日志 -->
        <div id="messages" class="tab-content">

                <div class="card-header">
                    <div class="card-title">💬 消息发送日志</div>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>用户ID</th>
                                <th>消息类型</th>

                        </thead>
                        <tbody id="msgBody">
                            <tr><td colspan="5"><div class="loading"><div class="spinner"></div></div></td></tr>
                        </tbody>
                    </table>

        <!-- 系统设置 -->
        <div id="system" class="tab-content">
            <div class="config-grid">
                <div class="config-card">
                    <h3>🔧 微信配置</h3>

                        <label>AppID</label>
                        <input value="wxc148a9c24090a2bb" readonly>
                    </div>
                    <div class="config-item">
                        <label>环境ID</label>
                        <input value="prod-d1gssem8n4896288b" readonly>
                    </div>
                    <div class="config-item">
                        <label>服务名</label>
                        <input value="yiyi" readonly>
                    </div>
                </div>

                    <h3>📱 消息模板</h3>
                    <div class="config-item">
                        <label>绑定通知</label>
                        <input value="ye6sttAhDmQPb_KxXUIsnpoUH87dn1BAUSsUHMLVoo0" readonly>
                    </div>
                    <div class="config-item">
                        <label>纪念日提醒</label>
                        <input value="EzWVVfGH0hfcou80ekmjrsqwVzQobr_So4eJwH30xMA" readonly>
                    </div>
                </div>
                <div class="config-card">
                    <h3>🗄️ 数据库</h3>
                    <div class="config-item">
                        <label>主机</label>
                        <input value="10.3.103.26" readonly>
                    </div>
                    <div class="config-item">
                        <label>数据库</label>
                        <input value="wxcloudrun" readonly>
                    </div>
                </div>
                <div class="config-card">
                    <h3>⏰ 服务状态</h3>
                    <div id="serviceInfo" style="color: var(--text-secondary); font-size: 14px;">加载中...</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API = '/api';

        // Tab switching
        document.querySelectorAll('.nav button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById(btn.dataset.tab).classList.add('active');
            });
        });

        // Toast
        function showToast(msg, type = '') {
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        // Fetch helper
        async function fetchAPI(path) {
            try {
                const res = await fetch(API + path);
                const data = await res.json();
                return data.success ? data.data : null;
            } catch (e) {
                console.error('API Error:', e);
                return null;
            }
        }

        // Days until
        function daysUntil(dateStr) {
            if (!dateStr) return '-';
            const target = new Date(dateStr);
            const today = new Date();
            today.setHours(0,0,0,0);
            target.setHours(0,0,0,0);
            let diff = Math.ceil((target - today) / 86400000);
            return diff < 0 ? '已过' : diff;
        }

        // Format date
        function fmtDate(s) {
            if (!s) return '-';
            const d = new Date(s);
            return `${d.getMonth()+1}月${d.getDate()}日`;
        }

        // Mood map
        const moods = { happy:'😊开心', love:'🥰甜蜜', sad:'😢难过', angry:'😤生气', miss:'🥺想你', shy:'😳害羞' };

        // Load dashboard
        async function loadDashboard() {
            const [users, couples, diaries, wishes, anniversaries] = await Promise.all([
                fetchAPI('/admin/users'),
                fetchAPI('/admin/couples'),
                fetchAPI('/admin/diaries'),
                fetchAPI('/admin/wishes'),
                fetchAPI('/admin/anniversaries')
            ]);

            document.getElementById('statUsers').textContent = users?.length || 0;
            document.getElementById('statCouples').textContent = couples?.length || 0;
            document.getElementById('statDiaries').textContent = diaries?.length || 0;
            document.getElementById('statWishes').textContent = wishes?.length || 0;
            document.getElementById('statAnniversaries').textContent = anniversaries?.length || 0;

            document.getElementById('statusText').textContent = `运行中 · ${(users?.length || 0)} 用户`;

            // Dashboard summary
            const bound = couples?.filter(c => c.user2_id)?.length || 0;
            const completedWishes = wishes?.filter(w => w.is_completed)?.length || 0;
            document.getElementById('dashboardContent').innerHTML = `
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px;">
                    <div style="background: linear-gradient(135deg, #FFE0EB, #FFC1D3); border-radius: 12px; padding: 20px;">
                        <div style="font-size: 14px; color: #8B4558; margin-bottom: 8px;">已绑定情侣</div>
                        <div style="font-size: 28px; font-weight: 700; color: #D63384;">${bound} / ${couples?.length || 0}</div>
                        <div style="font-size: 12px; color: #B56576; margin-top: 8px;">完成率 ${couples?.length ? Math.round(bound/couples.length*100) : 0}%</div>
                    </div>
                    <div style="background: linear-gradient(135deg, #D0F5E9, #A8E6CF); border-radius: 12px; padding: 20px;">
                        <div style="font-size: 14px; color: #1E6F50; margin-bottom: 8px;">愿望达成</div>
                        <div style="font-size: 28px; font-weight: 700; color: #00B894;">${completedWishes} / ${wishes?.length || 0}</div>
                        <div style="font-size: 12px; color: #3D9970; margin-top: 8px;">完成率 ${wishes?.length ? Math.round(completedWishes/wishes.length*100) : 0}%</div>
                    </div>
                    <div style="background: linear-gradient(135deg, #E8DEFF, #D1C1FF); border-radius: 12px; padding: 20px;">
                        <div style="font-size: 14px; color: #5B4A8A; margin-bottom: 8px;">纪念日总数</div>
                        <div style="font-size: 28px; font-weight: 700; color: #6C5CE7;">${anniversaries?.length || 0}</div>
                        <div style="font-size: 12px; color: #7C6FB0; margin-top: 8px;">记录你们的每个重要日子</div>
                    </div>
                </div>
            `;
        }

        // Load users
        async function loadUsers() {
            const data = await fetchAPI('/admin/users');
            const tbody = document.getElementById('usersBody');
            if (!data?.length) {
                tbody.innerHTML = '<tr><td colspan="3"><div class="empty"><div class="empty-icon">👥</div><div class="empty-text">暂无用户</div></div></td></tr>';
                return;
            }
            tbody.innerHTML = data.map(u => `
                <tr>
                    <td>
                        <div style="display:flex;align-items:center;gap:12px;">
                            <img class="avatar" src="${u.avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed='+u.id}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>👤</text></svg>'">
                            <div>
                                <div style="font-weight:500;">${u.nickname || '未设置'}</div>
                                <div style="font-size:12px;color:var(--text-muted);">${u.id}</div>
                            </div>
                        </div>
                    </td>
                    <td><code style="background:var(--bg);padding:4px 8px;border-radius:6px;font-size:12px;">${u.openid ? u.openid.substring(0,16)+'...' : '未绑定'}</code></td>
                    <td style="color:var(--text-secondary);">${fmtDate(u.created_at)}</td>
                </tr>
            `).join('');
        }

        // Load couples
        async function loadCouples() {
            const data = await fetchAPI('/admin/couples');
            const tbody = document.getElementById('couplesBody');
            if (!data?.length) {
                tbody.innerHTML = '<tr><td colspan="6"><div class="empty"><div class="empty-icon">💑</div><div class="empty-text">暂无情侣</div></div></td></tr>';
                return;
            }
            tbody.innerHTML = data.map(c => `
                <tr>
                    <td>
                        <div style="display:flex;align-items:center;gap:8px;">
                            <img class="avatar" src="${c.user1_avatar || ''}" style="width:32px;height:32px;" onerror="this.style.display='none'">
                            <span>${c.user1_name || '-'}</span>
                        </div>
                    </td>
                    <td>
                        <div style="display:flex;align-items:center;gap:8px;">
                            <img class="avatar" src="${c.user2_avatar || ''}" style="width:32px;height:32px;" onerror="this.style.display='none'">
                            <span>${c.user2_name || '<span style="color:var(--text-muted)">待绑定</span>'}</span>
                        </div>
                    </td>
                    <td><code style="background:#FFF0F5;padding:4px 10px;border-radius:6px;font-size:13px;color:var(--primary);font-weight:600;">${c.invite_code || '-'}</code></td>
                    <td><strong>${c.start_date ? daysUntil(c.start_date) : '-'}</strong> 天</td>
                    <td><span style="color:var(--primary);font-weight:600;">${c.points || 0}</span></td>
                    <td style="color:var(--text-secondary);">${fmtDate(c.created_at)}</td>
                </tr>
            `).join('');
        }

        // Load diaries
        async function loadDiaries() {
            const data = await fetchAPI('/admin/diaries');
            const tbody = document.getElementById('diariesBody');
            if (!data?.length) {
                tbody.innerHTML = '<tr><td colspan="7"><div class="empty"><div class="empty-icon">📝</div><div class="empty-text">暂无日记</div></div></td></tr>';
                return;
            }
            tbody.innerHTML = data.map(d => `
                <tr>
                    <td>
                        <div style="display:flex;align-items:center;gap:8px;">
                            <img class="avatar" src="${d.author_avatar || ''}" style="width:32px;height:32px;" onerror="this.style.display='none'">
                            <span>${d.author_name || '-'}</span>
                        </div>
                    </td>
                    <td><div style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${d.content || '-'}</div></td>
                    <td>${moods[d.mood] || d.mood || '-'}</td>
                    <td>❤️ ${d.likes || 0}</td>
                    <td>💬 ${d.comment_count || 0}</td>
                    <td style="color:var(--text-secondary);">${fmtDate(d.created_at)}</td>
                    <td><button class="btn btn-sm btn-danger" onclick="deleteDiary('${d.id}')">删除</button></td>
                </tr>
            `).join('');
        }

        async function deleteDiary(id) {
            if (!confirm('确定删除这篇日记吗？')) return;
            try {
                const res = await fetch(`${API}/admin/diaries/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    showToast('删除成功', 'success');
                    loadDiaries();
                    loadDashboard();
                }
            } catch (e) {
                showToast('删除失败', 'error');
            }
        }

        // Load wishes
        async function loadWishes() {
            const data = await fetchAPI('/admin/wishes');
            const tbody = document.getElementById('wishesBody');
            if (!data?.length) {
                tbody.innerHTML = '<tr><td colspan="4"><div class="empty"><div class="empty-icon">⭐</div><div class="empty-text">暂无愿望</div></div></td></tr>';
                return;
            }
            tbody.innerHTML = data.map(w => `
                <tr>
                    <td><span style="margin-right:6px;">${w.icon || '✨'}</span> ${w.title}</td>
                    <td style="color:var(--text-secondary);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${w.description || '-'}</td>
                    <td>${w.is_completed ? '<span class="badge badge-success">已完成</span>' : '<span class="badge badge-warning">进行中</span>'}</td>
                    <td style="color:var(--text-secondary);">${w.completed_at ? fmtDate(w.completed_at) : '-'}</td>
                </tr>
            `).join('');
        }

        // Load anniversaries
        async function loadAnniversaries() {
            const data = await fetchAPI('/admin/anniversaries');
            const tbody = document.getElementById('anniBody');
            if (!data?.length) {
                tbody.innerHTML = '<tr><td colspan="5"><div class="empty"><div class="empty-icon">📅</div><div class="empty-text">暂无纪念日</div></div></td></tr>';
                return;
            }
            const typeMap = { love:'💕 恋爱', birthday:'🎂 生日', custom:'📌 自定义' };
            tbody.innerHTML = data.map(a => `
                <tr>
                    <td><span style="margin-right:6px;">${a.icon || '🎂'}</span> ${a.title}</td>
                    <td>${a.date}</td>
                    <td><span class="badge badge-info">${typeMap[a.type] || a.type}</span></td>
                    <td>${a.is_remind ? '<span class="badge badge-success">开启</span>' : '<span class="badge badge-warning">关闭</span>'}</td>
                    <td><strong>${daysUntil(a.date)}</strong> 天</td>
                </tr>
            `).join('');
        }

        // Load messages
        async function loadMessages() {
            try {
                const res = await fetch(`${API}/message/logs`);
                const json = await res.json();
                const data = json.data || [];
                const tbody = document.getElementById('msgBody');
                if (!data.length) {
                    tbody.innerHTML = '<tr><td colspan="5"><div class="empty"><div class="empty-icon">💬</div><div class="empty-text">暂无消息记录</div></div></td></tr>';
                    return;
                }
                const statusMap = { sent:'已发送', pending:'发送中', failed:'失败' };
                const statusBadge = { sent:'badge-success', pending:'badge-warning', failed:'badge-danger' };
                tbody.innerHTML = data.slice(0, 50).map(m => `
                    <tr>
                        <td>${m.user_id || '-'}</td>
                        <td><span class="badge badge-info">${m.message_type || '-'}</span></td>
                        <td>${m.anniversary_id || '-'}</td>
                        <td><span class="badge ${statusBadge[m.status] || 'badge-info'}">${statusMap[m.status] || m.status}</span></td>
                        <td style="color:var(--text-secondary);">${fmtDate(m.created_at)}</td>
                    </tr>
                `).join('');
            } catch (e) {
                document.getElementById('msgBody').innerHTML = '<tr><td colspan="5"><div class="empty"><div class="empty-icon">💬</div><div class="empty-text">暂无消息记录</div></div></td></tr>';
            }
        }

        // Load service info
        async function loadServiceInfo() {
            try {
                const res = await fetch('/api/health');
                const data = await res.json();
                document.getElementById('serviceInfo').innerHTML = `
                    <div style="margin-bottom:12px;"><strong>版本:</strong> ${data.version || '-'}</div>
                    <div style="margin-bottom:12px;"><strong>状态:</strong> <span style="color:var(--success);">● 运行中</span></div>
                    <div><strong>时间:</strong> ${data.timestamp ? new Date(data.timestamp).toLocaleString('zh-CN') : '-'}</div>
                `;
            } catch (e) {
                document.getElementById('serviceInfo').innerHTML = '<span style="color:var(--danger);">无法连接服务</span>';
            }
        }

        // Search
        function setupSearch(inputId, tableId) {
            const input = document.getElementById(inputId);
            if (!input) return;
            input.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                document.querySelectorAll(`#${tableId} tr`).forEach(row => {
                    row.style.display = row.textContent.toLowerCase().includes(term) ? '' : 'none';
                });
            });
        }

        // Init
        loadDashboard();
        setupSearch('searchUsers', 'usersBody');
        setupSearch('searchCouples', 'couplesBody');
        setupSearch('searchDiaries', 'diariesBody');

        // Lazy load tabs
        const loaded = { dashboard: true };
        document.querySelectorAll('.nav button').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                if (loaded[tab]) return;
                loaded[tab] = true;
                switch(tab) {
                    case 'users': loadUsers(); break;
                    case 'couples': loadCouples(); break;
                    case 'diaries': loadDiaries(); break;
                    case 'wishes': loadWishes(); break;
                    case 'anniversaries': loadAnniversaries(); break;
                    case 'messages': loadMessages(); break;
                    case 'system': loadServiceInfo(); break;
                }
            });
        });
    </script>
</body>
</html>
