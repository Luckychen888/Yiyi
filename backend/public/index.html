<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>恋人空间 - 管理后台</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💕</text></svg>">
<style>
:root{--p:#FF6B9D;--pl:#FF8FB1;--s:#A29BFE;--a:#74B9FF;--ok:#00B894;--warn:#FDCB6E;--err:#FF7675;--bg:#FFF5F7;--card:#FFF;--tx:#2D3436;--tx2:#636E72;--tx3:#B2BEC3;--brd:#F0E6EA;--sh:0 4px 24px rgba(255,107,157,.12);--sh2:0 8px 40px rgba(255,107,157,.18);--r:16px;--rs:10px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.hd{background:linear-gradient(135deg,var(--p),var(--s));position:sticky;top:0;z-index:100;box-shadow:var(--sh2)}
.hd-in{max-width:1400px;margin:0 auto;padding:16px 24px}
.hd-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.logo{display:flex;align-items:center;gap:12px}
.logo-i{width:44px;height:44px;background:rgba(255,255,255,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px}
.logo h1{font-size:20px;color:#fff;font-weight:700}
.logo p{font-size:12px;color:rgba(255,255,255,.8)}
.st{display:flex;align-items:center;gap:8px;padding:6px 14px;background:rgba(255,255,255,.2);border-radius:16px;color:#fff;font-size:12px}
.st-dot{width:8px;height:8px;background:#00FF88;border-radius:50%;animation:pls 2s infinite}
@keyframes pls{0%,100%{opacity:1}50%{opacity:.5}}
.nav{display:flex;gap:4px;overflow-x:auto;padding-bottom:2px}
.nav::-webkit-scrollbar{display:none}
.nav button{padding:8px 16px;border:none;border-radius:20px;background:rgba(255,255,255,.15);color:rgba(255,255,255,.9);cursor:pointer;transition:.25s;font-size:13px;font-weight:500;white-space:nowrap}
.nav button:hover{background:rgba(255,255,255,.25)}
.nav button.on{background:#fff;color:var(--p);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.mn{max-width:1400px;margin:0 auto;padding:20px 24px}
.tc{display:none}.tc.on{display:block;animation:fi .3s}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px}
.sc{background:var(--card);border-radius:var(--r);padding:20px;box-shadow:var(--sh);position:relative;overflow:hidden;transition:.3s}
.sc:hover{transform:translateY(-3px);box-shadow:var(--sh2)}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--p),var(--s))}
.sc-i{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:12px}
.sc-i.pk{background:linear-gradient(135deg,#FFE0EB,#FFC1D3)}.sc-i.pp{background:linear-gradient(135deg,#E8DEFF,#D1C1FF)}.sc-i.bl{background:linear-gradient(135deg,#D6EEFF,#B8DCFF)}.sc-i.gn{background:linear-gradient(135deg,#D0F5E9,#A8E6CF)}.sc-i.og{background:linear-gradient(135deg,#FFE8CC,#FFD9A8)}
.sc-l{font-size:12px;color:var(--tx2);margin-bottom:6px}
.sc-v{font-size:28px;font-weight:700}
.cd{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:20px}
.cd-h{padding:16px 20px;border-bottom:1px solid var(--brd);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.cd-t{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.cd-acts{display:flex;gap:8px;align-items:center}
.si{padding:8px 14px 8px 36px;border:1px solid var(--brd);border-radius:var(--rs);font-size:13px;width:240px;background:var(--bg);transition:.25s}
.si:focus{outline:none;border-color:var(--p);background:#fff;box-shadow:0 0 0 3px rgba(255,107,157,.1)}
.sw{position:relative}.sw::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px}
.tw{padding:0 20px 20px;overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{padding:12px 10px;text-align:left;font-size:11px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--brd);background:var(--bg)}
td{padding:12px 10px;font-size:13px;border-bottom:1px solid var(--brd);vertical-align:middle}
tr:hover td{background:#FFF8FA}
.av{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--brd)}
.bg{display:inline-flex;align-items:center;padding:3px 8px;border-radius:10px;font-size:11px;font-weight:500}
.bg-ok{background:#E8F8F5;color:var(--ok)}.bg-w{background:#FFF8E1;color:#E17055}.bg-i{background:#E3F2FD;color:#1976D2}.bg-e{background:#FFEBEE;color:var(--err)}
.btn{padding:6px 14px;border:none;border-radius:var(--rs);cursor:pointer;font-size:12px;font-weight:500;transition:.2s}
.btn-p{background:var(--p);color:#fff}.btn-p:hover{background:var(--pl)}
.btn-d{background:var(--err);color:#fff}.btn-d:hover{opacity:.9}
.btn-g{background:transparent;color:var(--p);border:1px solid var(--p)}.btn-g:hover{background:var(--p);color:#fff}
.btn-s{background:var(--ok);color:#fff}.btn-s:hover{opacity:.9}
.btn-n{background:var(--tx3);color:#fff}.btn-n:hover{background:var(--tx2)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-acts{display:flex;gap:4px}
.emp{text-align:center;padding:50px 20px;color:var(--tx3)}
.emp-i{font-size:48px;margin-bottom:12px}
.emp-t{font-size:15px;color:var(--tx2)}
.ld{display:flex;align-items:center;justify-content:center;padding:40px}
.sp{width:32px;height:32px;border:3px solid var(--brd);border-top-color:var(--p);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
/* Modal */
.mo{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);justify-content:center;align-items:center;z-index:200;animation:fi .2s}
.mo.on{display:flex}
.mo-c{background:var(--card);border-radius:var(--r);padding:24px;width:90%;max-width:520px;max-height:85vh;overflow-y:auto;box-shadow:var(--sh2)}
.mo-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mo-h h3{font-size:17px}
.mo-x{font-size:22px;cursor:pointer;color:var(--tx3);padding:4px}.mo-x:hover{color:var(--tx)}
.fg{margin-bottom:14px}
.fg label{display:block;margin-bottom:5px;font-size:13px;color:var(--tx2);font-weight:500}
.fg input,.fg textarea,.fg select{width:100%;padding:10px 12px;border:1px solid var(--brd);border-radius:var(--rs);font-size:13px;transition:.2s}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 3px rgba(255,107,157,.1)}
.fg textarea{resize:vertical;min-height:80px}
.fa{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.toast{position:fixed;top:20px;right:20px;padding:14px 20px;background:var(--tx);color:#fff;border-radius:var(--rs);font-size:13px;z-index:300;animation:fi .3s;box-shadow:var(--sh2)}
.toast.ok{background:var(--ok)}.toast.er{background:var(--err)}
@media(max-width:768px){.hd-in{padding:12px 16px}.mn{padding:14px 16px}.stats{grid-template-columns:repeat(2,1fr)}.si{width:180px}}
</style>
</head>
<body>
<header class="hd"><div class="hd-in">
<div class="hd-top"><div class="logo"><div class="logo-i">💕</div><div><h1>恋人空间</h1><p>管理后台</p></div></div><div class="st"><div class="st-dot"></div><span id="stTx">连接中...</span></div></div>
<nav class="nav" id="nav">
<button class="on" data-t="dashboard">📊 仪表盘</button>
<button data-t="users">👥 用户</button>
<button data-t="couples">💑 情侣</button>
<button data-t="diaries">📝 日记</button>
<button data-t="wishes">⭐ 愿望</button>
<button data-t="anniversaries">📅 纪念日</button>
<button data-t="bills">💰 账单</button>
<button data-t="letters">💌 情书</button>
<button data-t="albums">📷 相册</button>
<button data-t="messages">💬 消息</button>
</nav></div></header>

<main class="mn" id="main"></main>

<!-- Modal -->
<div class="mo" id="modal"><div class="mo-c">
<div class="mo-h"><h3 id="moTitle">编辑</h3><span class="mo-x" onclick="closeMo()">×</span></div>
<div id="moBody"></div>
<div class="fa"><button class="btn btn-n" onclick="closeMo()">取消</button><button class="btn btn-p" id="moSave">保存</button></div>
</div></div>

<script>
const API='/api';let curData={},curTab='dashboard';

// Toast
function toast(m,t=''){const d=document.createElement('div');d.className='toast '+t;d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),3000)}

// Fetch
async function f(p){try{const r=await fetch(API+p);const j=await r.json();return j.success?j.data:null}catch(e){return null}}
async function fm(p,m,b){try{const r=await fetch(API+p,{method:m,headers:{'Content-Type':'application/json'},body:b?JSON.stringify(b):undefined});return(await r.json()).success}catch(e){return false}}

// Nav
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>{
document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('on'));b.classList.add('on');
curTab=b.dataset.t;loadTab(curTab)});

// Modal
function openMo(t,body,save){document.getElementById('moTitle').textContent=t;document.getElementById('moBody').innerHTML=body;document.getElementById('modal').classList.add('on');document.getElementById('moSave').onclick=save}
function closeMo(){document.getElementById('modal').classList.remove('on')}
document.getElementById('modal').onclick=e=>{if(e.target===document.getElementById('modal'))closeMo()};

// Days
function days(s){if(!s)return'-';const t=new Date(s),n=new Date();t.setHours(0,0,0,0);n.setHours(0,0,0,0);const d=Math.ceil((t-n)/864e5);return d<0?'已过':d}
function fd(s){if(!s)return'-';const d=new Date(s);return d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getDate().toString().padStart(2,'0')}
const moods={happy:'😊开心',love:'🥰甜蜜',sad:'😢难过',angry:'😤生气',miss:'🥺想你',shy:'😳害羞'};
const types={love:'💕恋爱',birthday:'🎂生日',custom:'📌自定义'};

// Main container
const M=document.getElementById('main');

function mkStats(items){return`<div class="stats">${items.map(i=>`<div class="sc"><div class="sc-i ${i.c}">${i.e}</div><div class="sc-l">${i.l}</div><div class="sc-v">${i.v}</div></div>`).join('')}</div>`}
function mkCard(title,extra,body){return`<div class="cd"><div class="cd-h"><div class="cd-t">${title}</div>${extra?`<div class="cd-acts">${extra}</div>`:''}</div><div class="tw">${body}</div></div>`}
function mkTable(heads,rows){return`<table><thead><tr>${heads.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.length?rows.join(''):`<tr><td colspan="${heads.length}"><div class="emp"><div class="emp-i">📭</div><div class="emp-t">暂无数据</div></div></td></tr>`}</tbody></table>`}

// Tab loader
async function loadTab(t){
M.innerHTML='<div class="ld"><div class="sp"></div></div>';
switch(t){
case'dashboard':await loadDash();break;case'users':await loadUsers();break;case'couples':await loadCouples();break;
case'diaries':await loadDiaries();break;case'wishes':await loadWishes();break;case'anniversaries':await loadAnni();break;
case'bills':await loadBills();break;case'letters':await loadLetters();break;case'albums':await loadAlbums();break;
case'messages':await loadMsgs();break;
}}

// Dashboard
async function loadDash(){
const[u,c,d,w,a]=await Promise.all([f('/admin/users'),f('/admin/couples'),f('/admin/diaries'),f('/admin/wishes'),f('/admin/anniversaries')]);
document.getElementById('stTx').textContent=`运行中 · ${(u?.length)||0} 用户`;
M.innerHTML=mkStats([
{e:'👥',l:'用户总数',v:u?.length||0,c:'pk'},{e:'💑',l:'情侣对数',v:c?.length||0,c:'pp'},
{e:'📝',l:'日记总数',v:d?.length||0,c:'bl'},{e:'⭐',l:'愿望总数',v:w?.length||0,c:'gn'},
{e:'📅',l:'纪念日',v:a?.length||0,c:'og'}
])+mkCard('📊 数据概览','',`<div style="padding:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px">
<div style="background:linear-gradient(135deg,#FFE0EB,#FFC1D3);border-radius:12px;padding:18px"><div style="font-size:13px;color:#8B4558">已绑定情侣</div><div style="font-size:26px;font-weight:700;color:#D63384;margin-top:6px">${c?.filter(x=>x.user2_id).length||0} / ${c?.length||0}</div></div>
<div style="background:linear-gradient(135deg,#D0F5E9,#A8E6CF);border-radius:12px;padding:18px"><div style="font-size:13px;color:#1E6F50">愿望达成</div><div style="font-size:26px;font-weight:700;color:#00B894;margin-top:6px">${w?.filter(x=>x.is_completed).length||0} / ${w?.length||0}</div></div>
<div style="background:linear-gradient(135deg,#E8DEFF,#D1C1FF);border-radius:12px;padding:18px"><div style="font-size:13px;color:#5B4A8A">纪念日</div><div style="font-size:26px;font-weight:700;color:#6C5CE7;margin-top:6px">${a?.length||0}</div></div>
</div>`)}

// Users
async function loadUsers(){
const d=await f('/admin/users')||[];
M.innerHTML=mkStats([{e:'👥',l:'用户总数',v:d.length,c:'pk'}])+
mkCard('👥 用户列表',`<div class="sw"><input class="si" placeholder="搜索用户..." oninput="filterT(this,'uBody')"></div>`,
mkTable(['用户','OpenID','创建时间','操作'],d.map(u=>`<tr>
<td><div style="display:flex;align-items:center;gap:10px"><img class="av" src="${u.avatar||''}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>👤</text></svg>'"><div><div style="font-weight:500">${u.nickname||'未设置'}</div><div style="font-size:11px;color:var(--tx3)">${u.id}</div></div></div></td>
<td><code style="background:var(--bg);padding:3px 6px;border-radius:4px;font-size:11px">${u.openid?u.openid.substring(0,16)+'...':'-'}</code></td>
<td style="color:var(--tx2)">${fd(u.created_at)}</td>
<td><div class="btn-acts"><button class="btn btn-sm btn-p" onclick='editUser(${JSON.stringify(u)})'>编辑</button><button class="btn btn-sm btn-d" onclick="delItem('/admin/users/${u.id}','用户')">删除</button></div></td>
</tr>`)));}
function editUser(u){openMo('编辑用户',`
<div class="fg"><label>昵称</label><input id="eNick" value="${u.nickname||''}"></div>
<div class="fg"><label>头像URL</label><input id="eAv" value="${u.avatar||''}"></div>`,
async()=>{if(await fm('/admin/users/'+u.id,'PUT',{nickname:document.getElementById('eNick').value,avatar:document.getElementById('eAv').value})){toast('更新成功','ok');closeMo();loadUsers()}else toast('更新失败','er')})}

// Couples
async function loadCouples(){
const d=await f('/admin/couples')||[];
M.innerHTML=mkStats([{e:'💑',l:'情侣对数',v:d.length,c:'pp'}])+
mkCard('💑 情侣列表',`<div class="sw"><input class="si" placeholder="搜索情侣..." oninput="filterT(this,'cBody')"></div>`,
mkTable(['用户1','用户2','邀请码','恋爱天数','积分','创建时间','操作'],d.map(c=>`<tr>
<td><div style="display:flex;align-items:center;gap:8px"><img class="av" src="${c.user1_avatar||''}" style="width:30px;height:30px" onerror="this.style.display='none'"><span>${c.user1_name||'-'}</span></div></td>
<td><div style="display:flex;align-items:center;gap:8px"><img class="av" src="${c.user2_avatar||''}" style="width:30px;height:30px" onerror="this.style.display='none'"><span>${c.user2_name||'<span style=color:var(--tx3)>待绑定</span>'}</span></div></td>
<td><code style="background:#FFF0F5;padding:3px 8px;border-radius:6px;font-size:12px;color:var(--p);font-weight:600">${c.invite_code||'-'}</code></td>
<td><strong>${c.start_date?days(c.start_date):'-'}</strong> 天</td>
<td style="color:var(--p);font-weight:600">${c.points||0}</td>
<td style="color:var(--tx2)">${fd(c.created_at)}</td>
<td><div class="btn-acts"><button class="btn btn-sm btn-p" onclick='editCouple(${JSON.stringify(c).replace(/'/g,"\\'")})'>编辑</button><button class="btn btn-sm btn-d" onclick="delItem('/admin/couples/${c.id}','情侣')">删除</button></div></td>
</tr>`)));}
function editCouple(c){openMo('编辑情侣',`
<div class="fg"><label>用户1昵称</label><input id="ec1" value="${c.user1_name||''}"></div>
<div class="fg"><label>用户2昵称</label><input id="ec2" value="${c.user2_name||''}"></div>
<div class="fg"><label>在一起日期</label><input id="ec3" type="date" value="${c.start_date||''}"></div>
<div class="fg"><label>积分</label><input id="ec4" type="number" value="${c.points||0}"></div>`,
async()=>{if(await fm('/admin/couples/'+c.id,'PUT',{user1_name:document.getElementById('ec1').value,user2_name:document.getElementById('ec2').value,start_date:document.getElementById('ec3').value,points:parseInt(document.getElementById('ec4').value)||0})){toast('更新成功','ok');closeMo();loadCouples()}else toast('更新失败','er')})}

// Diaries
async function loadDiaries(){
const d=await f('/admin/diaries')||[];
M.innerHTML=mkStats([{e:'📝',l:'日记总数',v:d.length,c:'bl'}])+
mkCard('📝 日记列表',`<div class="sw"><input class="si" placeholder="搜索日记..." oninput="filterT(this,'dBody')"></div>`,
mkTable(['作者','内容','心情','点赞','评论','时间','操作'],d.map(di=>`<tr>
<td><div style="display:flex;align-items:center;gap:8px"><img class="av" src="${di.author_avatar||''}" style="width:30px;height:30px" onerror="this.style.display='none'"><span>${di.author_name||'-'}</span></div></td>
<td><div style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${di.content||'-'}</div></td>
<td>${moods[di.mood]||di.mood||'-'}</td>
<td>❤️ ${di.likes||0}</td>
<td>💬 ${di.comment_count||0}</td>
<td style="color:var(--tx2)">${fd(di.created_at)}</td>
<td><div class="btn-acts"><button class="btn btn-sm btn-p" onclick='editDiary(${JSON.stringify(di).replace(/'/g,"\\'")})'>编辑</button><button class="btn btn-sm btn-d" onclick="delItem('/admin/diaries/${di.id}','日记')">删除</button></div></td>
</tr>`)));}
function editDiary(d){openMo('编辑日记',`
<div class="fg"><label>内容</label><textarea id="edC">${d.content||''}</textarea></div>
<div class="fg"><label>心情</label><select id="edM"><option value="">无</option>${Object.entries(moods).map(([k,v])=>`<option value="${k}" ${d.mood===k?'selected':''}>${v}</option>`).join('')}</select></div>
<div class="fg"><label>位置</label><input id="edL" value="${d.location||''}"></div>
<div class="fg"><label>天气</label><input id="edW" value="${d.weather||''}"></div>`,
async()=>{if(await fm('/admin/diaries/'+d.id,'PUT',{content:document.getElementById('edC').value,mood:document.getElementById('edM').value,location:document.getElementById('edL').value,weather:document.getElementById('edW').value})){toast('更新成功','ok');closeMo();loadDiaries()}else toast('更新失败','er')})}

// Wishes
async function loadWishes(){
const d=await f('/admin/wishes')||[];
M.innerHTML=mkStats([{e:'⭐',l:'愿望总数',v:d.length,c:'gn'}])+
mkCard('⭐ 愿望列表','',
mkTable(['标题','描述','状态','完成时间','操作'],d.map(w=>`<tr>
<td><span style="margin-right:4px">${w.icon||'✨'}</span> ${w.title}</td>
<td style="color:var(--tx2);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${w.description||'-'}</td>
<td>${w.is_completed?'<span class="bg bg-ok">已完成</span>':'<span class="bg bg-w">进行中</span>'}</td>
<td style="color:var(--tx2)">${w.completed_at?fd(w.completed_at):'-'}</td>
<td><div class="btn-acts"><button class="btn btn-sm btn-p" onclick='editWish(${JSON.stringify(w).replace(/'/g,"\\'")})'>编辑</button><button class="btn btn-sm btn-d" onclick="delItem('/admin/wishes/${w.id}','愿望')">删除</button></div></td>
</tr>`)));}
function editWish(w){openMo('编辑愿望',`
<div class="fg"><label>标题</label><input id="ewT" value="${w.title||''}"></div>
<div class="fg"><label>描述</label><textarea id="ewD">${w.description||''}</textarea></div>
<div class="fg"><label>图标</label><input id="ewI" value="${w.icon||''}"></div>
<div class="fg"><label>状态</label><select id="ewS"><option value="0" ${!w.is_completed?'selected':''}>进行中</option><option value="1" ${w.is_completed?'selected':''}>已完成</option></select></div>`,
async()=>{if(await fm('/admin/wishes/'+w.id,'PUT',{title:document.getElementById('ewT').value,description:document.getElementById('ewD').value,icon:document.getElementById('ewI').value,is_completed:document.getElementById('ewS').value==='1'})){toast('更新成功','ok');closeMo();loadWishes()}else toast('更新失败','er')})}

// Anniversaries
async function loadAnni(){
const d=await f('/admin/anniversaries')||[];
M.innerHTML=mkStats([{e:'📅',l:'纪念日',v:d.length,c:'og'}])+
mkCard('📅 纪念日列表','',
mkTable(['标题','日期','类型','提醒','倒计时','操作'],d.map(a=>`<tr>
<td><span style="margin-right:4px">${a.icon||'🎂'}</span> ${a.title}</td>
<td>${a.date}</td>
<td><span class="bg bg-i">${types[a.type]||a.type}</span></td>
<td>${a.is_remind?'<span class="bg bg-ok">开启</span>':'<span class="bg bg-w">关闭</span>'}</td>
<td><strong>${days(a.date)}</strong> 天</td>
<td><div class="btn-acts"><button class="btn btn-sm btn-p" onclick='editAnni(${JSON.stringify(a).replace(/'/g,"\\'")})'>编辑</button><button class="btn btn-sm btn-d" onclick="delItem('/admin/anniversaries/${a.id}','纪念日')">删除</button></div></td>
</tr>`)));}
function editAnni(a){openMo('编辑纪念日',`
<div class="fg"><label>标题</label><input id="eaT" value="${a.title||''}"></div>
<div class="fg"><label>描述</label><input id="eaD" value="${a.description||''}"></div>
<div class="fg"><label>日期</label><input id="eaDt" type="date" value="${a.date||''}"></div>
<div class="fg"><label>类型</label><select id="eaTp">${Object.entries(types).map(([k,v])=>`<option value="${k}" ${a.type===k?'selected':''}>${v}</option>`).join('')}</select></div>
<div class="fg"><label>图标</label><input id="eaI" value="${a.icon||''}"></div>
<div class="fg"><label>提醒</label><select id="eaR"><option value="0" ${!a.is_remind?'selected':''}>关闭</option><option value="1" ${a.is_remind?'selected':''}>开启</option></select></div>
<div class="fg"><label>提前提醒天数</label><input id="eaRd" type="number" value="${a.remind_days||0}"></div>`,
async()=>{if(await fm('/admin/anniversaries/'+a.id,'PUT',{title:document.getElementById('eaT').value,description:document.getElementById('eaD').value,date:document.getElementById('eaDt').value,type:document.getElementById('eaTp').value,icon:document.getElementById('eaI').value,is_remind:document.getElementById('eaR').value==='1',remind_days:parseInt(document.getElementById('eaRd').value)||0})){toast('更新成功','ok');closeMo();loadAnni()}else toast('更新失败','er')})}

// Bills
async function loadBills(){
const d=await f('/admin/bills')||[];
M.innerHTML=mkStats([{e:'💰',l:'账单总数',v:d.length,c:'pk'},{e:'💰',l:'总金额',v:'¥'+d.reduce((s,b)=>s+Number(b.amount),0).toFixed(0),c:'og'}])+
mkCard('💰 账单列表','',
mkTable(['分类','描述','金额','付款者','日期','操作'],d.map(b=>`<tr>
<td><span style="margin-right:4px">${b.category_icon||'💰'}</span> ${b.category||'-'}</td>
<td>${b.description||b.sweet_word||'-'}</td>
<td style="color:var(--p);font-weight:600">¥${Number(b.amount).toFixed(2)}</td>
<td>${b.paid_by_name||'-'}</td>
<td style="color:var(--tx2)">${fd(b.bill_date||b.created_at)}</td>
<td><button class="btn btn-sm btn-d" onclick="delItem('/admin/bills/${b.id}','账单')">删除</button></td>
</tr>`)));}

// Letters
async function loadLetters(){
const d=await f('/admin/letters')||[];
M.innerHTML=mkStats([{e:'💌',l:'情书总数',v:d.length,c:'pp'}])+
mkCard('💌 情书列表','',
mkTable(['标题','发送者','接收者','状态','发送时间','操作'],d.map(l=>`<tr>
<td><strong>${l.title}</strong></td>

<td>${l.to_id?'对方':'-'}</td>
<td>${l.is_opened?'<span class="bg bg-ok">已读</span>':'<span class="bg bg-i">未读</span>'}</td>
<td style="color:var(--tx2)">${fd(l.send_at||l.created_at)}</td>
<td><button class="btn btn-sm btn-d" onclick="delItem('/admin/letters/${l.id}','情书')">删除</button></td>
</tr>`)));}

// Albums
async function loadAlbums(){
const d=await f('/admin/albums')||[];
M.innerHTML=mkStats([{e:'📷',l:'照片总数',v:d.length,c:'bl'}])+
mkCard('📷 相册列表','',
mkTable(['照片','描述','上传者','时间','操作'],d.map(p=>`<tr>
<td><img src="${p.url}" style="width:50px;height:50px;border-radius:8px;object-fit:cover" onerror="this.style.display='none'"></td>
<td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.description||'-'}</td>
<td>${p.uploaded_by_name||'-'}</td>
<td style="color:var(--tx2)">${fd(p.created_at)}</td>
<td><button class="btn btn-sm btn-d" onclick="delItem('/admin/albums/${p.id}','照片')">删除</button></td>
</tr>`)));}

// Messages
async function loadMsgs(){
const d=(await fetch(API+'/message/logs').then(r=>r.json())).data||[];
M.innerHTML=mkStats([{e:'💬',l:'消息总数',v:d.length,c:'gn'}])+
mkCard('💬 消息日志','',
mkTable(['用户','类型','纪念日','状态','时间'],d.slice(0,50).map(m=>`<tr>
<td>${m.user_id||'-'}</td>
<td><span class="bg bg-i">${m.message_type||'-'}</span></td>
<td>${m.anniversary_id||'-'}</td>
<td><span class="bg bg-${m.status==='sent'?'ok':m.status==='failed'?'e':'w'}">${m.status==='sent'?'已发送':m.status==='failed'?'失败':'发送中'}</span></td>
<td style="color:var(--tx2)">${fd(m.created_at)}</td>
</tr>`)));}

// Delete
async function delItem(p,n){if(!confirm('确定删除该'+n+'吗？'))return;if(await fm(p,'DELETE')){toast('删除成功','ok');loadTab(curTab)}else toast('删除失败','er')}

// Filter
function filterT(el,id){const s=el.value.toLowerCase();document.querySelectorAll('#'+id+' tr').forEach(r=>r.style.display=r.textContent.toLowerCase().includes(s)?'':'none')}

// Init
loadDash();
</script>
</body>
</html>
