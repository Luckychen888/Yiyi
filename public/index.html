<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恋人空间 - 管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            color: #333;
            font-size: 24px;
        }
        
        .header p {
            color: #666;
            margin-top: 5px;
        }
        
        .nav {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .nav button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #f0f0f0;
            color: #333;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .nav button:hover,
        .nav button.active {
            background: #667eea;
            color: white;
        }
        
        .content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 10px;
            color: white;
        }
        
        .stat-card h3 {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        
        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
        }
        
        tr:hover {
            background: #f8f9fa;
        }
        
        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .btn-danger {
            background: #ff4757;
            color: white;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .status-online {
            color: #2ed573;
        }
        
        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💑 恋人空间 - 管理后台</h1>
            <p>API 服务运行正常</p>
            <div class="nav">
                <button class="active" data-tab="dashboard">仪表盘</button>
                <button data-tab="users">用户管理</button>
                <button data-tab="couples">情侣管理</button>
                <button data-tab="diaries">日记管理</button>
            </div>
        </div>

        <div class="content">
            <!-- 仪表盘 -->
            <div id="dashboard" class="tab-content active">
                <div class="stats" id="stats">
                    <div class="stat-card">
                        <h3>用户总数</h3>
                        <div class="number" id="userCount">-</div>
                    </div>
                    <div class="stat-card">
                        <h3>绑定情侣数</h3>
                        <div class="number" id="coupleCount">-</div>
                    </div>
                    <div class="stat-card">
                        <h3>日记总数</h3>
                        <div class="number" id="diaryCount">-</div>
                    </div>
                    <div class="stat-card">
                        <h3>愿望总数</h3>
                        <div class="number" id="wishCount">-</div>
                    </div>
                </div>
            </div>

            <!-- 用户管理 -->
            <div id="users" class="tab-content">
                <h2>用户列表</h2>
                <table id="usersTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>昵称</th>
                            <th>头像</th>
                            <th>创建时间</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <!-- 情侣管理 -->
            <div id="couples" class="tab-content">
                <h2>情侣列表</h2>
                <table id="couplesTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>用户1</th>
                            <th>用户2</th>
                            <th>邀请码</th>
                            <th>在一起时间</th>
                            <th>积分</th>
                            <th>创建时间</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <!-- 日记管理 -->
            <div id="diaries" class="tab-content">
                <h2>日记列表</h2>
                <table id="diariesTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>作者</th>
                            <th>内容</th>
                            <th>心情</th>
                            <th>点赞数</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 简单的前端逻辑
        const API_BASE = '/api/admin';
        
        // 页面切换
        document.querySelectorAll('.nav button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById(btn.dataset.tab).classList.add('active');
                
                loadTab(btn.dataset.tab);
            });
        });
        
        // 加载不同标签页的数据
        function loadTab(tab) {
            switch(tab) {
                case 'dashboard': loadDashboard(); break;
                case 'users': loadUsers(); break;
                case 'couples': loadCouples(); break;
                case 'diaries': loadDiaries(); break;
            }
        }
        
        async function loadDashboard() {
            try {
                const [usersRes, couplesRes, diariesRes, wishesRes] = await Promise.all([
                    fetch('/api/admin/users'),
                    fetch('/api/admin/couples'),
                    fetch('/api/admin/diaries'),
                    fetch('/api/admin/wishes')
                ]);
                
                const users = await usersRes.json();
                const couples = await couplesRes.json();
                const diaries = await diariesRes.json();
                const wishes = await wishesRes.json();
                
                document.getElementById('userCount').textContent = users.data?.length || 0;
                document.getElementById('coupleCount').textContent = couples.data?.length || 0;
                document.getElementById('diaryCount').textContent = diaries.data?.length || 0;
                document.getElementById('wishCount').textContent = wishes.data?.length || 0;
            } catch (e) {
                console.error('加载统计数据失败:', e);
            }
        }
        
        async function loadUsers() {
            try {
                const res = await fetch('/api/admin/users');
                const data = await res.json();
                renderUsersTable(data.data || []);
            } catch (e) {
                console.error('加载用户失败:', e);
            }
        }
        
        function renderUsersTable(users) {
            const tbody = document.querySelector('#usersTable tbody');
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty">暂无用户</td></tr>';
                return;
            }
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>${user.id}</td>
                    <td>${user.nickname || '未设置'}</td>
                    <td>${user.avatar ? `<img src="${user.avatar}" style="width:40px;height:40px;border-radius:50%;"/>` : '-'}</td>
                    <td>${user.created_at}</td>
                </tr>
            `).join('');
        }
        
        async function loadCouples() {
            try {
                const res = await fetch('/api/admin/couples');
                const data = await res.json();
                renderCouplesTable(data.data || []);
            } catch (e) {
                console.error('加载情侣失败:', e);
            }
        }
        
        function renderCouplesTable(couples) {
            const tbody = document.querySelector('#couplesTable tbody');
            if (couples.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty">暂无情侣</td></tr>';
                return;
            }
            tbody.innerHTML = couples.map(couple => `
                <tr>
                    <td>${couple.id}</td>
                    <td>${couple.user1_name || '-'}</td>
                    <td>${couple.user2_name || '-'}</td>
                    <td>${couple.invite_code}</td>
                    <td>${couple.start_date || '-'}</td>
                    <td>${couple.points || 0}</td>
                    <td>${couple.created_at}</td>
                </tr>
            `).join('');
        }
        
        async function loadDiaries() {
            try {
                const res = await fetch('/api/admin/diaries');
                const data = await res.json();
                renderDiariesTable(data.data || []);
            } catch (e) {
                console.error('加载日记失败:', e);
            }
        }
        
        function renderDiariesTable(diaries) {
            const tbody = document.querySelector('#diariesTable tbody');
            if (diaries.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="empty">暂无日记</td></tr>';
                return;
            }
            tbody.innerHTML = diaries.map(diary => `
                <tr>
                    <td>${diary.id}</td>
                    <td>${diary.author_name || '-'}</td>
                    <td>${diary.content?.substring(0, 50)}${diary.content?.length > 50 ? '...' : ''}</td>
                    <td>${diary.mood || '-'}</td>
                    <td>${diary.likes || 0}</td>
                    <td>${diary.created_at}</td>
                    <td><button class="btn btn-danger" onclick="deleteDiary('${diary.id}')">删除</button></td>
                </tr>
            `).join('');
        }
        
        window.deleteDiary = async function(id) {
            if (!confirm('确定要删除这篇日记吗？')) return;
            
            try {
                const res = await fetch(`/api/admin/diaries/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    alert('删除成功');
                    loadDiaries();
                    loadDashboard();
                }
            } catch (e) {
                alert('删除失败');
            }
        };
        
        loadDashboard();
    </script>
</body>
</html>
